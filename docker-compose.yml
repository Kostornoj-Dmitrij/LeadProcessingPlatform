version: '3.8'

name: lead-processing-platform

networks:
  lead-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  schema-registry-data:

services:
  # ==================== INFRASTRUCTURE ====================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_PREFIX}${POSTGRES_DB:-lead_db}${DB_SUFFIX}
      DB_PREFIX: ${DB_PREFIX}
      DB_SUFFIX: ${DB_SUFFIX}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./_infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - lead-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:${KAFKA_VERSION:-7.5.0}
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - lead-network
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.5.0}
    container_name: kafka
    depends_on:
      init-kafka-users:
        condition: service_completed_successfully
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,SASL_PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,SASL_PLAINTEXT://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: SCRAM-SHA-256
      KAFKA_AUTHORIZER_CLASS_NAME: ""
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
      KAFKA_SUPER_USERS: ""
      ZOOKEEPER_SASL_ENABLED: "false"
      KAFKA_ZOOKEEPER_SET_ACL: "false"
      KAFKA_SKIP_ZOOKEEPER_PREFLIGHT: "true"
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
      KAFKA_LEAD_PASSWORD: ${KAFKA_LEAD_PASSWORD}
      KAFKA_ENRICH_PASSWORD: ${KAFKA_ENRICH_PASSWORD}
      KAFKA_SCORE_PASSWORD: ${KAFKA_SCORE_PASSWORD}
      KAFKA_DIST_PASSWORD: ${KAFKA_DIST_PASSWORD}
      KAFKA_NOTIFY_PASSWORD: ${KAFKA_NOTIFY_PASSWORD}
      KAFKA_OPTS: "-Djava.security.auth.login.config=/tmp/kafka_server_jaas.conf -Dzookeeper.sasl.client=false"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./_infrastructure/kafka/log4j.properties:/etc/kafka/log4j.properties
      - ./_infrastructure/kafka/create-jaas.sh:/tmp/create-jaas.sh
    networks:
      - lead-network
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        /tmp/create-jaas.sh
        exec /etc/confluent/docker/run
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:${KAFKA_VERSION:-7.5.0}
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
      SCHEMA_REGISTRY_AVRO_COMPATIBILITY_LEVEL: backward
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
      SCHEMA_REGISTRY_SKIP_KAFKA_PREFLIGHT: "true"
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
    ports:
      - "8085:8085"
    volumes:
      - schema-registry-data:/var/lib/schema-registry
    networks:
      - lead-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/subjects" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==================== INITIALIZATION ====================
  init-kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.5.0}
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - lead-network
    volumes:
      - ./_infrastructure/kafka/init-topics.sh:/init-topics.sh
    environment:
      TOPIC_PREFIX: ${TOPIC_PREFIX}
      TOPIC_SUFFIX: ${TOPIC_SUFFIX}
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
    entrypoint: [ "/bin/bash", "-c" ]
    command: /init-topics.sh

  init-kafka-users:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.5.0}
    container_name: init-kafka-users
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - lead-network
    volumes:
      - ./_infrastructure/kafka/init-scram.sh:/init-scram.sh
      - ./_infrastructure/kafka/init-kafka-users.sh:/init-kafka-users.sh
      - ./_infrastructure/kafka/log4j.properties:/etc/kafka/log4j.properties
    environment:
      KAFKA_BROKER_ID: 99
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      ZOOKEEPER_SASL_ENABLED: "false"
      KAFKA_ZOOKEEPER_SET_ACL: "false"
      KAFKA_SKIP_ZOOKEEPER_PREFLIGHT: "true"
      KAFKA_OPTS: "-Dzookeeper.sasl.client=false"
      KAFKA_LEAD_PASSWORD: ${KAFKA_LEAD_PASSWORD}
      KAFKA_ENRICH_PASSWORD: ${KAFKA_ENRICH_PASSWORD}
      KAFKA_SCORE_PASSWORD: ${KAFKA_SCORE_PASSWORD}
      KAFKA_DIST_PASSWORD: ${KAFKA_DIST_PASSWORD}
      KAFKA_NOTIFY_PASSWORD: ${KAFKA_NOTIFY_PASSWORD}
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
    entrypoint: [ "/bin/bash", "-c" ]
    command: /init-scram.sh

  # ==================== MONITORING & MANAGEMENT ====================
  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8085
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: SCRAM-SHA-256
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.scram.ScramLoginModule required username=\"admin\" password=\"${KAFKA_ADMIN_PASSWORD}\";"
      KAFKA_CLUSTERS_0_METRICS_TYPE: "NONE"
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
    ports:
      - "8081:8080"
    networks:
      - lead-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lead-platform.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./_infrastructure/pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - lead-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:8.0
    container_name: aspire-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
      DOTNET_DASHBOARD_OTLP_ENDPOINT_URL: "http://0.0.0.0:4317"
      DOTNET_DASHBOARD_OTLP_HTTP_ENDPOINT_URL: "http://0.0.0.0:4318"
    ports:
      - "${ASPIRE_DASHBOARD_PORT:-18888}:18888"
      - "4317:4317"
      - "4318:4318"
    networks:
      - lead-network
    restart: unless-stopped

  # ==================== MICROSERVICES ====================
  lead-service:
    build:
      context: .
      dockerfile: services/LeadService/LeadService.Host/Dockerfile
    container_name: lead-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${DB_PREFIX}lead_db${DB_SUFFIX};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: lead-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      Kafka__Username: lead-service
      Kafka__Password: ${KAFKA_LEAD_PASSWORD}
      Kafka__SecurityProtocol: SaslPlaintext
      Kafka__SaslMechanism: ScramSha256
      OpenTelemetry__Endpoint: http://aspire-dashboard:4317
      Naming__TopicPrefix: ${TOPIC_PREFIX}
      Naming__TopicSuffix: ${TOPIC_SUFFIX}
      Naming__DbPrefix: ${DB_PREFIX}
      Naming__DbSuffix: ${DB_SUFFIX}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    networks:
      - lead-network
    restart: unless-stopped

  enrichment-service:
    build:
      context: .
      dockerfile: services/EnrichmentService/EnrichmentService.Host/Dockerfile
    container_name: enrichment-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${DB_PREFIX}enrichment_db${DB_SUFFIX};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: enrichment-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      Kafka__Username: enrichment-service
      Kafka__Password: ${KAFKA_ENRICH_PASSWORD}
      Kafka__SecurityProtocol: SaslPlaintext
      Kafka__SaslMechanism: ScramSha256
      OpenTelemetry__Endpoint: http://aspire-dashboard:4317
      Naming__TopicPrefix: ${TOPIC_PREFIX}
      Naming__TopicSuffix: ${TOPIC_SUFFIX}
      Naming__DbPrefix: ${DB_PREFIX}
      Naming__DbSuffix: ${DB_SUFFIX}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  scoring-service:
    build:
      context: .
      dockerfile: services/ScoringService/ScoringService.Host/Dockerfile
    container_name: scoring-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${DB_PREFIX}scoring_db${DB_SUFFIX};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: scoring-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      Kafka__Username: scoring-service
      Kafka__Password: ${KAFKA_SCORE_PASSWORD}
      Kafka__SecurityProtocol: SaslPlaintext
      Kafka__SaslMechanism: ScramSha256
      OpenTelemetry__Endpoint: http://aspire-dashboard:4317
      Naming__TopicPrefix: ${TOPIC_PREFIX}
      Naming__TopicSuffix: ${TOPIC_SUFFIX}
      Naming__DbPrefix: ${DB_PREFIX}
      Naming__DbSuffix: ${DB_SUFFIX}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  distribution-service:
    build:
      context: .
      dockerfile: services/DistributionService/DistributionService.Host/Dockerfile
    container_name: distribution-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${DB_PREFIX}distribution_db${DB_SUFFIX};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: distribution-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      Kafka__Username: distribution-service
      Kafka__Password: ${KAFKA_DIST_PASSWORD}
      Kafka__SecurityProtocol: SaslPlaintext
      Kafka__SaslMechanism: ScramSha256
      OpenTelemetry__Endpoint: http://aspire-dashboard:4317
      Naming__TopicPrefix: ${TOPIC_PREFIX}
      Naming__TopicSuffix: ${TOPIC_SUFFIX}
      Naming__DbPrefix: ${DB_PREFIX}
      Naming__DbSuffix: ${DB_SUFFIX}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/NotificationService/NotificationService.Host/Dockerfile
    container_name: notification-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${DB_PREFIX}notification_db${DB_SUFFIX};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: notification-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      Kafka__Username: notification-service
      Kafka__Password: ${KAFKA_NOTIFY_PASSWORD}
      Kafka__SecurityProtocol: SaslPlaintext
      Kafka__SaslMechanism: ScramSha256
      OpenTelemetry__Endpoint: http://aspire-dashboard:4317
      Naming__TopicPrefix: ${TOPIC_PREFIX}
      Naming__TopicSuffix: ${TOPIC_SUFFIX}
      Naming__DbPrefix: ${DB_PREFIX}
      Naming__DbSuffix: ${DB_SUFFIX}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/ApiGateway/ApiGateway.Host/Dockerfile
    container_name: api-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      Services__LeadService: http://lead-service:80
      OpenTelemetry__Endpoint: http://aspire-dashboard:4317
      Jwt__SecretKey: ${JWT_SECRET_KEY}
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      lead-service:
        condition: service_started
    networks:
      - lead-network
    restart: unless-stopped