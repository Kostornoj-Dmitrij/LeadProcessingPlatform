version: '3.8'

name: lead-processing-platform

networks:
  lead-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  schema-registry-data:

services:
  # ==================== INFRASTRUCTURE ====================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lead_db}
      POSTGRES_MULTIPLE_DATABASES: lead_db, enrichment_db, scoring_db, distribution_db, notification_db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./_infrastructure/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - lead-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:${KAFKA_VERSION:-7.5.0}
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - lead-network
    healthcheck:
      test: ["CMD", "nc", "-vz", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.5.0}
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_BYTES: 10737418240
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./_infrastructure/kafka/log4j.properties:/etc/kafka/log4j.properties
    networks:
      - lead-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  schema-registry:
    image: confluentinc/cp-schema-registry:${KAFKA_VERSION:-7.5.0}
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
      SCHEMA_REGISTRY_AVRO_COMPATIBILITY_LEVEL: backward
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO
    ports:
      - "8085:8085"
    volumes:
      - schema-registry-data:/var/lib/schema-registry
    networks:
      - lead-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/subjects" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==================== INITIALIZATION ====================
  init-kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.5.0}
    container_name: init-kafka
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    networks:
      - lead-network
    volumes:
      - ./_infrastructure/kafka/init-topics.sh:/init-topics.sh
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
      /init-topics.sh
      "

  # ==================== MONITORING & MANAGEMENT ====================
  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8085
    ports:
      - "8081:8080"
    networks:
      - lead-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lead-platform.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - ./_infrastructure/pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - lead-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:8.0
    container_name: aspire-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "${ASPIRE_DASHBOARD_PORT:-18888}:18888"
      - "${OTLP_PORT:-18889}:18889"
    networks:
      - lead-network
    restart: unless-stopped

  # ==================== MICROSERVICES ====================
  lead-service:
    build:
      context: .
      dockerfile: services/LeadService/LeadService.Host/Dockerfile
    container_name: lead-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=lead_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: lead-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      OpenTelemetry__Endpoint: http://aspire-dashboard:18889
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    networks:
      - lead-network
    restart: unless-stopped

  enrichment-service:
    build:
      context: .
      dockerfile: services/EnrichmentService/EnrichmentService.Host/Dockerfile
    container_name: enrichment-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=enrichment_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: enrichment-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      OpenTelemetry__Endpoint: http://aspire-dashboard:18889
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  scoring-service:
    build:
      context: .
      dockerfile: services/ScoringService/ScoringService.Host/Dockerfile
    container_name: scoring-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=scoring_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: scoring-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      OpenTelemetry__Endpoint: http://aspire-dashboard:18889
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  distribution-service:
    build:
      context: .
      dockerfile: services/DistributionService/DistributionService.Host/Dockerfile
    container_name: distribution-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=distribution_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: distribution-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      OpenTelemetry__Endpoint: http://aspire-dashboard:18889
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/NotificationService/NotificationService.Host/Dockerfile
    container_name: notification-service
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=notification_db;Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Kafka__BootstrapServers: kafka:29092
      Kafka__GroupId: notification-service
      Kafka__SchemaRegistryUrl: http://schema-registry:8085
      OpenTelemetry__Endpoint: http://aspire-dashboard:18889
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - lead-network
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/ApiGateway/ApiGateway.Host/Dockerfile
    container_name: api-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      Services__LeadService: http://lead-service:80
      OpenTelemetry__Endpoint: http://aspire-dashboard:18889
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    depends_on:
      lead-service:
        condition: service_started
    networks:
      - lead-network
    restart: unless-stopped